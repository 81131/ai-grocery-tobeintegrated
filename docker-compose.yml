

services:
  db:
    image: postgres:15-alpine
    container_name: grocery_postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: grocery_fastapi_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grocery_react_frontend
    # Assuming standard Vite or Create React App dev server
    command: npm run dev 
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000" # Change to "5173:5173" if using Vite's default port
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data: